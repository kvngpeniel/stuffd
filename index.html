<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PennyTech — We Turn Attention Into Clients</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
/* ─────────────────────────────────────────
   TOKENS & RESET
───────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --obsidian:    #0F0F12;
  --obsidian-2:  #13131a;
  --obsidian-3:  #18181f;
  --purple:      #7C3AED;
  --violet:      #A855F7;
  --violet-dim:  #6d28d9;
  --gold:        #D4AF37;
  --gold-dim:    #b8962e;
  --white:       #FAFAFA;
  --white-60:    rgba(250,250,250,0.6);
  --white-20:    rgba(250,250,250,0.08);
  --white-10:    rgba(250,250,250,0.04);
  --glow-sm:     0 0 24px rgba(124,58,237,0.35);
  --glow-md:     0 0 60px rgba(124,58,237,0.25), 0 0 120px rgba(124,58,237,0.1);
  --glow-lg:     0 0 100px rgba(124,58,237,0.4), 0 0 200px rgba(124,58,237,0.15);
  --border:      rgba(124,58,237,0.18);
  --border-dim:  rgba(250,250,250,0.06);
}

html{scroll-behavior:smooth;font-size:16px}
body{
  background:var(--obsidian);
  color:var(--white);
  font-family:'Montserrat',sans-serif;
  font-weight:400;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* Custom desktop-only cursor style */
@media (min-width: 1025px) {
  body { cursor: none; }
  .nav-cta, .btn-primary, .btn-ghost, .service-cta, .email-sub { cursor: none; }
}

/* ─────────────────────────────────────────
   CURSOR
───────────────────────────────────────── */
.cur{
  position:fixed;top:0;left:0;
  width:10px;height:10px;
  background:var(--violet);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .25s,height .25s,background .25s,opacity .25s;
  mix-blend-mode:screen;
  display: none; /* Hidden by default on mobile */
}
@media (min-width: 1025px) {
  .cur { display: block; }
}
.cur.big{width:44px;height:44px;background:transparent;border:1.5px solid var(--violet);opacity:.7}

/* ─────────────────────────────────────────
   NAV
───────────────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:28px 64px;
  display:flex;align-items:center;justify-content:space-between;
  transition:background .4s,padding .4s,border-bottom .4s;
}
nav.scrolled{
  background:rgba(15,15,18,0.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:18px 64px;
  border-bottom:1px solid var(--border-dim);
}
.nav-logo{
  font-family:'Montserrat',sans-serif;
  font-weight:800;
  font-size:1.25rem;
  letter-spacing:-0.02em;
  color:var(--white);
}
.nav-logo span{color:var(--violet)}
.nav-links{
  display:flex;gap:40px;align-items:center;
  list-style:none;
}
.nav-links a{
  color:var(--white-60);
  text-decoration:none;
  font-size:.8rem;
  font-weight:500;
  letter-spacing:.07em;
  text-transform:uppercase;
  transition:color .2s;
}
.nav-links a:hover{color:var(--white)}
.nav-cta{
  background:transparent;
  border:1px solid var(--border);
  color:var(--white);
  font-family:'Montserrat',sans-serif;
  font-weight:600;
  font-size:.75rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  padding:12px 28px;
  transition:background .25s,border-color .25s,box-shadow .25s;
}
.nav-cta:hover{
  background:var(--purple);
  border-color:var(--purple);
  box-shadow:var(--glow-sm);
}

/* ─────────────────────────────────────────
   AMBIENT BACKGROUND ORBS
───────────────────────────────────────── */
.bg-orb{
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  pointer-events:none;
  opacity:.18;
  z-index:0;
}
.orb-1{
  width:700px;height:700px;
  background:var(--purple);
  top:-200px;right:-200px;
  animation:orbFloat 14s ease-in-out infinite;
}
.orb-2{
  width:500px;height:500px;
  background:var(--violet);
  bottom:-150px;left:-100px;
  animation:orbFloat 18s ease-in-out infinite reverse;
}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0)}
  50%{transform:translate(30px,-40px)}
}

/* ─────────────────────────────────────────
   HERO
───────────────────────────────────────── */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  padding:160px 40px 120px;
  position:relative;z-index:1;
}

/* grid overlay */
.hero::before{
  content:'';
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
  mask-image:radial-gradient(ellipse at center,rgba(0,0,0,1) 20%,rgba(0,0,0,0) 80%);
}

.hero-eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid var(--border);
  padding:8px 20px;
  font-size:.7rem;
  font-weight:600;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--violet);
  margin-bottom:48px;
  backdrop-filter:blur(10px);
  opacity:0;
  animation:fadeUp .7s ease .2s forwards;
}
.hero-eyebrow::before{
  content:'';width:6px;height:6px;
  background:var(--violet);
  border-radius:50%;
  box-shadow:0 0 10px var(--violet);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.4;transform:scale(.7)}
}

.hero-headline{
  font-family:'Montserrat',sans-serif;
  font-weight:900;
  font-size:clamp(3.2rem,8vw,7.5rem);
  line-height:.92;
  letter-spacing:-0.05em;
  max-width:900px;
  margin-bottom:32px;
}
.hero-headline .line{display:block;overflow:hidden}
.hero-headline .word{
  display:inline-block;
  opacity:0;
  transform:translateY(110%);
  animation:wordSlide .8s cubic-bezier(.16,1,.3,1) forwards;
}
.w1{animation-delay:.35s}
.w2{animation-delay:.5s}
.w3{animation-delay:.6s}
.w4{animation-delay:.7s}
.w5{animation-delay:.8s}
.w6{animation-delay:.9s}

.hero-headline .highlight{
  background:linear-gradient(135deg,var(--purple),var(--violet));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

@keyframes wordSlide{
  to{opacity:1;transform:translateY(0)}
}

.hero-sub{
  font-family:'Montserrat',sans-serif;
  font-weight:400;
  font-size:clamp(.95rem,1.6vw,1.2rem);
  color:var(--white-60);
  max-width:560px;
  line-height:1.75;
  margin-bottom:56px;
  opacity:0;
  animation:fadeUp .7s ease 1s forwards;
}

.hero-ctas{
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;
  opacity:0;
  animation:fadeUp .7s ease 1.15s forwards;
}

.btn-primary{
  background:linear-gradient(135deg,var(--purple),var(--violet));
  color:var(--white);
  font-family:'Montserrat',sans-serif;
  font-weight:700;
  font-size:.8rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  padding:18px 40px;
  border:none;
  position:relative;
  overflow:hidden;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 0 40px rgba(124,58,237,.4);
}
.btn-primary::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,var(--violet),var(--purple));
  opacity:0;
  transition:opacity .3s;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 60px rgba(124,58,237,.6)}
.btn-primary:hover::before{opacity:1}
.btn-primary span{position:relative;z-index:1}

.btn-ghost{
  background:transparent;
  color:var(--white-60);
  font-family:'Montserrat',sans-serif;
  font-weight:500;
  font-size:.8rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  padding:18px 32px;
  border:1px solid var(--border-dim);
  transition:color .2s,border-color .2s;
}
.btn-ghost:hover{color:var(--white);border-color:var(--border)}

/* hero glow line */
.hero-glow-line{
  width:1px;height:80px;
  background:linear-gradient(to bottom,transparent,var(--violet),transparent);
  margin:64px auto 0;
  opacity:0;
  animation:fadeUp .6s ease 1.4s forwards;
}

/* ─────────────────────────────────────────
   STATS BAR
───────────────────────────────────────── */
.stats-bar{
  padding:40px 64px;
  border-top:1px solid var(--border-dim);
  border-bottom:1px solid var(--border-dim);
  display:flex;align-items:center;justify-content:space-between;
  gap:24px;
  position:relative;z-index:1;
  background:rgba(19,19,26,0.6);
  backdrop-filter:blur(10px);
}
.stat{text-align:center;flex:1}
.stat-n{
  font-family:'Montserrat',sans-serif;
  font-weight:800;
  font-size:2.2rem;
  letter-spacing:-0.04em;
  background:linear-gradient(135deg,var(--white),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;
}
.stat-l{
  font-size:.68rem;
  font-weight:500;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--white-60);
  margin-top:4px;
  display:block;
}
.stat-divider{width:1px;height:48px;background:var(--border-dim)}

/* ─────────────────────────────────────────
   SECTION COMMON
───────────────────────────────────────── */
.section{
  padding:140px 64px;
  position:relative;z-index:1;
}
.section-eyebrow{
  font-size:.68rem;
  font-weight:700;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--violet);
  margin-bottom:20px;
  display:flex;align-items:center;gap:12px;
}
.section-eyebrow::before{
  content:'';
  display:block;
  width:28px;height:1px;
  background:var(--violet);
}
.section-title{
  font-family:'Montserrat',sans-serif;
  font-weight:800;
  font-size:clamp(2rem,4vw,3.5rem);
  letter-spacing:-0.04em;
  line-height:1.05;
  max-width:640px;
}
.section-title em{
  font-style:normal;
  background:linear-gradient(135deg,var(--purple),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.section-sub{
  font-size:.95rem;
  color:var(--white-60);
  line-height:1.8;
  max-width:520px;
  margin-top:20px;
}

/* ─────────────────────────────────────────
   WHAT WE SELL
───────────────────────────────────────── */
.what-section{
  background:var(--obsidian-2);
}
.sell-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:2px;
  margin-top:80px;
}
.sell-card{
  background:var(--obsidian-3);
  padding:48px 32px;
  position:relative;
  overflow:hidden;
  border:1px solid transparent;
  transition:border-color .3s,transform .3s;
  cursor:default;
}
.sell-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,.08),transparent);
  opacity:0;
  transition:opacity .3s;
}
.sell-card:hover{
  border-color:var(--border);
  transform:translateY(-4px);
}
.sell-card:hover::before{opacity:1}

.sell-icon{
  font-size:1.8rem;
  margin-bottom:28px;
  display:block;
  filter:drop-shadow(0 0 12px rgba(168,85,247,.5));
}
.sell-name{
  font-family:'Montserrat',sans-serif;
  font-weight:700;
  font-size:.95rem;
  letter-spacing:.02em;
  margin-bottom:10px;
}
.sell-desc{
  font-size:.78rem;
  color:var(--white-60);
  line-height:1.7;
}
.sell-num{
  position:absolute;
  bottom:20px;right:24px;
  font-family:'Cormorant Garamond',serif;
  font-size:3.5rem;
  font-weight:300;
  color:rgba(124,58,237,.08);
  line-height:1;
  pointer-events:none;
}

/* ─────────────────────────────────────────
   SERVICES — 3 CARDS
───────────────────────────────────────── */
.services-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
  margin-top:80px;
}

.service-card{
  background:var(--obsidian-3);
  border:1px solid var(--border-dim);
  padding:52px 40px;
  position:relative;
  overflow:hidden;
  display:flex;flex-direction:column;
  transition:border-color .35s,box-shadow .35s,transform .35s;
}
.service-card::after{
  content:'';
  position:absolute;top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--purple),transparent);
  transform:scaleX(0);
  transition:transform .4s ease;
}
.service-card:hover{
  border-color:var(--border);
  box-shadow:var(--glow-md);
  transform:translateY(-6px);
}
.service-card:hover::after{transform:scaleX(1)}

.service-card.featured{
  border-color:var(--border);
  background:linear-gradient(160deg,rgba(124,58,237,.12),var(--obsidian-3) 60%);
  box-shadow:var(--glow-sm);
}
.service-card.featured::after{transform:scaleX(1)}

.service-badge{
  font-size:.62rem;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--gold);
  border:1px solid rgba(212,175,55,.3);
  padding:5px 12px;
  width:fit-content;
  margin-bottom:32px;
}
.service-num{
  font-family:'Cormorant Garamond',serif;
  font-size:1rem;
  font-weight:300;
  color:var(--violet);
  letter-spacing:.08em;
  margin-bottom:16px;
  font-style:italic;
}
.service-name{
  font-family:'Montserrat',sans-serif;
  font-weight:800;
  font-size:1.35rem;
  letter-spacing:-0.03em;
  line-height:1.1;
  margin-bottom:20px;
}
.service-tagline{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:1.05rem;
  color:var(--violet);
  margin-bottom:24px;
  line-height:1.5;
}
.service-desc{
  font-size:.82rem;
  color:var(--white-60);
  line-height:1.8;
  flex:1;
  margin-bottom:40px;
}
.service-list{
  list-style:none;
  margin-bottom:40px;
  display:flex;flex-direction:column;gap:10px;
}
.service-list li{
  font-size:.78rem;
  color:var(--white-60);
  display:flex;align-items:flex-start;gap:10px;
}
.service-list li::before{
  content:'✦';
  color:var(--violet);
  font-size:.6rem;
  margin-top:3px;
  flex-shrink:0;
}
.service-cta{
  background:transparent;
  border:1px solid var(--border);
  color:var(--white);
  font-family:'Montserrat',sans-serif;
  font-weight:600;
  font-size:.72rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  padding:14px 24px;
  transition:background .2s,border-color .2s,box-shadow .2s;
  align-self:flex-start;
}
.service-cta:hover{
  background:var(--purple);
  border-color:var(--purple);
  box-shadow:var(--glow-sm);
}
.service-card.featured .service-cta{
  background:linear-gradient(135deg,var(--purple),var(--violet));
  border:none;
  box-shadow:0 0 30px rgba(124,58,237,.5);
}
.service-card.featured .service-cta:hover{
  box-shadow:0 0 60px rgba(124,58,237,.7);
}

/* ─────────────────────────────────────────
   QUOTE / MANIFESTO
───────────────────────────────────────── */
.manifesto{
  padding:120px 64px;
  text-align:center;
  position:relative;z-index:1;
  background:var(--obsidian-2);
}
.manifesto::before{
  content:'';
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:600px;height:300px;
  background:radial-gradient(ellipse,rgba(124,58,237,.15) 0%,transparent 70%);
  pointer-events:none;
}
.manifesto-quote{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2rem,4.5vw,4rem);
  font-weight:300;
  font-style:italic;
  line-height:1.3;
  max-width:820px;
  margin:0 auto 32px;
  color:var(--white);
  position:relative;z-index:1;
}
.manifesto-quote strong{
  font-weight:500;
  color:var(--violet);
  font-style:normal;
}
.manifesto-attr{
  font-size:.75rem;
  font-weight:600;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--white-60);
  position:relative;z-index:1;
}

/* ─────────────────────────────────────────
   HOW IT WORKS
───────────────────────────────────────── */
.process-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1px;
  margin-top:80px;
  background:var(--border-dim);
  border:1px solid var(--border-dim);
}
.process-step{
  background:var(--obsidian);
  padding:52px 36px;
  position:relative;
  overflow:hidden;
}
.process-step:hover .process-bg{opacity:1}
.process-bg{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,.07),transparent);
  opacity:0;
  transition:opacity .35s;
}
.process-n{
  font-family:'Cormorant Garamond',serif;
  font-size:4rem;
  font-weight:300;
  color:rgba(168,85,247,.15);
  line-height:1;
  margin-bottom:28px;
  display:block;
}
.process-title{
  font-family:'Montserrat',sans-serif;
  font-weight:700;
  font-size:1rem;
  margin-bottom:12px;
  position:relative;z-index:1;
}
.process-desc{
  font-size:.8rem;
  color:var(--white-60);
  line-height:1.75;
  position:relative;z-index:1;
}

/* ─────────────────────────────────────────
   EMAIL CAPTURE CTA (Formspree Powered)
───────────────────────────────────────── */
.cta-section{
  padding:160px 64px;
  text-align:center;
  position:relative;z-index:1;
  overflow:hidden;
}
.cta-section::before{
  content:'';
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:800px;height:400px;
  background:radial-gradient(ellipse,rgba(124,58,237,.2) 0%,transparent 70%);
  pointer-events:none;
}
/* large decorative text */
.cta-bg-text{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Montserrat',sans-serif;
  font-weight:900;
  font-size:clamp(8rem,22vw,20rem);
  letter-spacing:-0.05em;
  color:rgba(124,58,237,.03);
  white-space:nowrap;
  pointer-events:none;
  user-select:none;
}

.cta-title{
  font-family:'Montserrat',sans-serif;
  font-weight:900;
  font-size:clamp(2.5rem,6vw,5.5rem);
  letter-spacing:-0.05em;
  line-height:.95;
  margin-bottom:24px;
  position:relative;z-index:1;
}
.cta-sub{
  font-size:1rem;
  color:var(--white-60);
  max-width:460px;
  margin:0 auto 56px;
  line-height:1.75;
  position:relative;z-index:1;
}

/* Form structure for AJAX backend */
.email-wrap{
  display:flex;
  gap:0;
  max-width:500px;
  margin:0 auto;
  position:relative;z-index:1;
}
.email-inp{
  flex:1;
  background:rgba(250,250,250,.04);
  border:1px solid var(--border-dim);
  border-right:none;
  color:var(--white);
  font-family:'Montserrat',sans-serif;
  font-size:.9rem;
  font-weight:400;
  padding:18px 24px;
  outline:none;
  transition:border-color .2s;
}
.email-inp::placeholder{color:rgba(250,250,250,.25)}
.email-inp:focus{border-color:var(--purple)}
.email-sub{
  background:linear-gradient(135deg,var(--purple),var(--violet));
  color:var(--white);
  font-family:'Montserrat',sans-serif;
  font-weight:700;
  font-size:.75rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  padding:18px 32px;
  border:none;
  white-space:nowrap;
  transition:box-shadow .25s,transform .2s;
  box-shadow:0 0 30px rgba(124,58,237,.4);
}
.email-sub:hover{box-shadow:0 0 50px rgba(124,58,237,.7);transform:translateY(-1px)}
.email-note{font-size:.7rem;color:rgba(250,250,250,.2);margin-top:14px;position:relative;z-index:1}

.success-block{
  display:none;
  align-items:center;gap:12px;
  border:1px solid rgba(168,85,247,.35);
  background:rgba(124,58,237,.08);
  padding:18px 28px;
  font-size:.85rem;
  font-weight:500;
  color:var(--violet);
  max-width:500px;
  margin:0 auto;
  position:relative;z-index:1;
}
.success-block.on{display:flex}

  </div>
  <div class="footer-copy">© 2026 PennyTech. All rights reserved.</div>

<script>
/* CURSOR (Desktop only execution) */
const cur = document.getElementById('cur');
let mx=0,my=0;
if (window.innerWidth > 1024) {
  document.addEventListener('mousemove',e=>{
    mx=e.clientX;my=e.clientY;
    cur.style.left=mx+'px';cur.style.top=my+'px';
  });
  document.querySelectorAll('button,a,input').forEach(el=>{
    el.addEventListener('mouseenter',()=>cur.classList.add('big'));
    el.addEventListener('mouseleave',()=>cur.classList.remove('big'));
  });
}

/* NAV SCROLL */
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>{
  nav.classList.toggle('scrolled',window.scrollY>60);
});

/* SCROLL TO */
function scrollTo(sel){
  document.querySelector(sel)?.scrollIntoView({behavior:'smooth'});
}

/* SCROLL TO COMPATIBILITY FOR BUTTONS */
document.querySelectorAll('.service-cta, .nav-cta, .btn-primary').forEach(btn => {
  btn.addEventListener('click', () => scrollTo('#cta'));
});

/* SCROLL REVEAL */
const revealEls=document.querySelectorAll('.reveal');
const ro=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add('up');
  });
},{threshold:.12});
revealEls.forEach(el=>ro.observe(el));

/* EMAIL SUBMIT (Connected to your Formspree Dashboard) */
function submitEmail(){
  const val=document.getElementById('emailVal').value.trim();
  const subBtn=document.querySelector('.email-sub');
  
  if(!val||!val.includes('@')){
    const inp=document.getElementById('emailVal');
    inp.style.borderColor='rgba(212,175,55,.6)';
    setTimeout(()=>inp.style.borderColor='',1500);
    return;
  }
  
  subBtn.innerText = "Sending...";
  subBtn.disabled = true;

  // Formspree API Integration via AJAX
  fetch('https://formspree.io/f/meewaewz', {
      method: 'POST',
      headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
      },
      body: JSON.stringify({
          email: val,
          message: 'Lead requested a Strategy Call via PennyTech homepage.'
      })
  })
  .then(response => {
      if (response.ok) {
          document.getElementById('emailWrap').style.display='none';
          document.getElementById('emailNote').style.display='none';
          document.getElementById('successBlock').classList.add('on');
      } else {
          throw new Error('Formspree setup error');
      }
  })
  .catch(error => {
      console.log(error);
      subBtn.innerText = "Book Your Call";
      subBtn.disabled = false;
      alert("Something went wrong. Please check your network or try again.");
  });
}

/* ENTER KEY */
document.getElementById('emailVal').addEventListener('keydown',e=>{
  if(e.key==='Enter') submitEmail();
});
</script>
</body>
